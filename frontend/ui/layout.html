
<!-- ========================
 TOP TOOLBAR
======================== -->
<div class="toolbar">

  <!-- Logo -->
  <div class="logo-container">
    <img src="data:image/jpeg;base64,{{LOGO_B64}}" />
  </div>

  <!-- Title -->
  <div class="left">
    <div class="row-top">
      <span class="title">Notebook</span>
    </div>
    <div class="row-bottom">
      <span class="home">🏠 Home</span>
    </div>
  </div>

  <!-- Search -->
  <div class="center">
    <button class="cog-btn" onclick="navigate('Admin')">⚙️</button>
    <span class="separator">|</span>
    <input id="searchBox" placeholder="Search in All Experiments">
    <button type="button" onclick="search()">🔍</button>
    <button onclick="nav('Advanced')">Advanced</button>
  </div>

  <!-- Right icons -->
  <div class="right">
    <button onclick="goHome()">🏠</button>
    <button onclick="toggleNotif()">🌍</button>
    <button onclick="nav('profile')">👤</button>
  </div>

</div>

        </div>

        </div>

            <div class="menu-item">All Experiments</div>

  </div>

  <!-- Main Content -->
  <div class="main-content">
    {{CONTENT}}
  </div>

</div>

<!-- ========================
 GLOBAL JS (ONE PLACE)
======================== -->
<script>
  function search() {
    const q = document.getElementById("searchBox").value.trim();
    if (!q) return;
    window.location.href = "?page=search&q=" + encodeURIComponent(q);
  }

  function nav(page) {
    window.location.href = "?page=" + page;
  }
  
  function goHome() {
    // Explicitly go to Home1 page
    window.location.href = "?page=home";
  }


  function toggleNotif() {
    const n = document.getElementById("notif");
    n.style.display = n.style.display === "block" ? "none" : "block";
  }
</script>
