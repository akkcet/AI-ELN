<div class="submission-page">

  <div class="submission-toolbar">
    <!-- Logo -->
        <div class="logo-container">
        <img src="data:image/jpeg;base64,{{LOGO_B64}}" />
        </div>
        <!-- Title -->
        <div class="left">
            <div class="row-top">
                <span class="title">Notebook</span>
            </div>
            <div class="row-bottom">
                <span class="home">🏠 Submission</span>
            </div>
            
        </div>
        <div class="center">
              <button class="cog-btn" onclick="navigate('Admin')">⚙️</button>
              <span class="separator">|</span>
              <span class="experimentNo" id="expid">{{EXPERIMENT_ID}}</span>
          </div>
        <!-- Right icons -->
        <div class="right">
            <button class="submission-btn"  title="Open Submission for the Experiment">Go to Submission</button>
            <button onclick="goHome()">🏠</button>
            <button onclick="toggleNotif()">🌍</button>
            <button onclick="nav('profile')">👤</button>
        </div>
  </div>

  <div class="submission-shell">

    <!-- LEFT: PDF Preview -->
    <div class="submission-preview">
      <iframe
        class="submission-pdf"
        src="/experiments/{{EXPERIMENT_ID}}/pdf"
      ></iframe>
    </div>

    <!-- RIGHT: Sign Panel -->
    <div class="submission-panel">

      <div class="submission-stage">
        Stage: <strong>New</strong>
        <span class="submission-actions">
          <button id="signBtn" disabled>Sign</button>
        </span>
      </div>

      <div class="submission-field">
        <label>Submitted by</label>
        <input type="text" value="Arun Khuntia" disabled />
      </div>

      <div class="submission-field">
        <label>Co‑Signer <span class="required">*</span></label>
        <select id="cosignerSelect">
          <option value="">Select co‑signer</option>
        </select>
      </div>

      <div class="submission-field">
        <label>Reason for Signing <span class="required">*</span></label>
        <select id="reasonSelect">
          <option value="">Select reason</option>
          <option>Review completed</option>
          <option>Data verified</option>
          <option>QA approval</option>
        </select>
      </div>

      <div class="submission-field full">
        <label>Comment</label>
        <textarea id="commentBox" placeholder="Enter your text here…"></textarea>
      </div>

      <!-- Submission Actions 
      <div class="submission-actions">
        <button id="signBtn" disabled>Sign</button>
      </div>-->
    </div>

  </div>
</div>
<script>
function getExperimentIdFromPage() {
    const el = document.getElementById("expid");
    return el ? el.textContent.trim() : null;
  }
document.addEventListener("DOMContentLoaded", () => {
  /*const cosigner = document.getElementById("cosignerSelect");
   const cosigner = document.getElementById("cosignerSelect");*/
  const reason   = document.getElementById("reasonSelect");
  const signBtn  = document.getElementById("signBtn");

  function validate() {
    signBtn.disabled = !(reason.value);
  }

  /*cosigner.addEventListener("change", validate);*/
  reason.addEventListener("change", validate);
});

document.getElementById("signBtn")
  .addEventListener("click", async () => {
    alert("Signing experiment...");
    const params = new URLSearchParams(window.location.search);
    const expId = getExperimentIdFromPage();

    if (!expId) {
      alert("Experiment ID missing");
      return;
    }

    const payload = {
            password: "pwd"
    };

    try {
      const res = await fetch(
        `http://localhost:8000/experiments/${expId}/submit?password=${payload.password}`,
        {
          method: "POST",
          /*headers: { "Content-Type": "application/json" },  
          body: JSON.stringify(payload)*/
        }
      );

      if (!res.ok) {
        throw new Error("Submission failed");
      }

      // ✅ Success UI
      alert("Experiment submitted successfully");

      // Option A: close tab
      window.close(); 

      // Option B: disable form instead
      // disableSubmissionForm();

    } catch (err) {
      console.error(err);
      alert("Failed to submit experiment");
    }
  });


</script>
