<div class="main-inner template-selector-page">

  <div class="template-shell">

    <!-- ========================
         TEMPLATE SUB-SIDEBAR
         ======================== -->
    <!--<div class="template-sub-sidebar">
      <div class="template-sub-header">Experiment</div>

      <div class="template-sub-item active">
        Templates
      </div>
    </div> -->

    <!-- ========================
         TEMPLATE MAIN CONTENT
         ======================== -->
    <div class="template-main-content">

      <!-- Header -->
      <div class="template-header">
        <h2>Create New Experiment</h2>

        <div class="template-actions">
          <button class="primary-btn" id="blankExperimentBtn">Blank New Experiment</button>
          <button class="secondary-btn" disabled>Create From Template</button>
        </div>
      </div>

      <!-- Template Source -->
      <div class="template-source">
        <label>
          <input type="radio" name="templateSource" checked />
          Personal Templates
        </label>
        <label>
          <input type="radio" name="templateSource" />
          Public Templates
        </label>
      </div>

      <!-- Filters -->
      <div class="template-filters">
        
        <div class="template-filters">
          <select class="filter-name">
            <option>Name</option>
            <option>WP 42 test</option>
            <option>WP 43 test</option>
          </select>

          <select class="filter-category">
            <option>Category</option>
            <option>Training</option>
            <option>Validation</option>
          </select>
        </div>

      </div>

      <!-- Template Table -->
      <table class="search-table template-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Category</th>
          </tr>
        </thead>
        <tbody>
          <tr class="selected">
            <td><a>WP 42 test</a></td>
            <td>Testing purpose</td>
            <td>Training</td>
          </tr>
        </tbody>
      </table>

    </div>

  </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const btn = document.getElementById("blankExperimentBtn");

    if (!btn) return;

    btn.addEventListener("click", async () => {
      btn.disabled = true;

      try {
        BACKEND_URL = "http://localhost:8000"
        const response = await fetch("http://localhost:8000/experiments", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            /*type: "BLANK",*/
            author: "arun.khuntia"
          })
        });

        if (!response.ok) {
          throw new Error("Failed to create experiment");
        }

        const experiment = await response.json();

        // ✅ Open editor in NEW TAB with experiment id
        window.open(
          `?page=experiment-editor&experiment_id=${experiment.experiment_id}`,
          "_blank"
        );

      } catch (err) {
        console.error(err);
        alert("Could not create experiment.");
      } finally {
        btn.disabled = false;
      }
    });
  });
</script>
