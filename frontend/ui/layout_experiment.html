  /*this is to load initial data*/
  
  function waitForEditorSections(cb) {
    const editor = document.getElementById("editorSections");
    if (editor) {
      cb(editor);
    } else {
      setTimeout(() => waitForEditorSections(cb), 50);
    }
  }

  (async function initEditor() {
   
    console.log("EDITOR SCRIPT RUNNING");

    const experimentId = getExperimentIdFromPage();
    console.log("Experiment ID:", experimentId);

    if (!experimentId) {
      console.error("Experiment ID not found");
      return;
    }

    try {
      // 1️⃣ Load experiment metadata
      const response = await fetch(
        `http://localhost:8000/experiments/${experimentId}`
      );
      // alert("got response"+ response);
      if (!response.ok) {
        throw new Error("Failed to fetch experiment");
      }
      alert("got response");
      
      const raw = await response.text();
      //alert("RAW RESPONSE:\n" + raw);
      const exp = JSON.parse(raw);
      //alert("Parsed experiment: " + JSON.stringify(exp));
      expx = JSON.stringify(exp);
      
      const secs = Array.isArray(exp.sections)
        ? exp.sections
        : JSON.parse(exp.sections || "[]");

      //alert("check:  " + secs);
      
      const editor = document.getElementById("editorSections");
      editor.innerHTML = "";
      
      secs
        .sort((a, b) => (a.position ?? 0) - (b.position ?? 0))
        .forEach(section => {
          renderSection(section);
        });

      document.getElementById("expAuthor").value = expx.author;
      document.getElementById("expDateStarted").value =
        new Date(expx.date_started).toLocaleString();
      
      // 2️⃣ Load sections from DB
      if (!expx.sections) {
        console.log("No sections found");
        return;
      }
      const sections = Array.isArray(expx.sections)
        ? expx.sections
        : JSON.parse(expx.sections || "[]");
      /*const sections = Array.isArray(exp.sections)?exp.sections: JSON.parse(exp.sections || "[]");*/

      //alert("Sections count: " + sections.length);
      console.log("Reloading sections:", sections);

      
      waitForEditorSections((editor) => {
        editor.innerHTML = "";

        sections
          .sort((a, b) => (a.position ?? 0) - (b.position ?? 0))
          .forEach(section => {
            renderSection(section);
          });
      });


    } catch (err) {
      console.error("Failed to initialize experiment editor", err);
    }
  
  })();

  /* =========================
   AUTOSAVE (PER SECTION)
   ========================= */

  function attachAutosave(sectionEl, sectionType) {
    let autosaveTimer = null;

    const triggerSave = () => {
      clearTimeout(autosaveTimer);

      autosaveTimer = setTimeout(() => {
        const sectionId = sectionEl.dataset.id;
        const payload = {};

        // ✅ TEXT FIELD (metadata row)
        if (sectionType === "Text Field") {
          const labelEl = sectionEl.querySelector(".meta-label-input");
          const valueEl = sectionEl.querySelector(".meta-input");

          payload.label = labelEl?.value ?? "";
          payload.content = valueEl?.value ?? "";
        }

        // ✅ LOOKUP SECTIONS (Site, Wash Method, etc.)
        else if (
          ["Site", "Category", "Region", "County", "Brand(Food)", "Exp Details", "Wash Method"]
            .includes(sectionType)
        ) {
          const labelEl = sectionEl.querySelector(".meta-label-input");
          const selectEl = sectionEl.querySelector("select");

          payload.label = labelEl?.value ?? sectionType;
          payload.content = selectEl?.value ?? "";
        }

        // ✅ BODY TEXT
        else if (sectionType === "Body Text") {
          const textarea = sectionEl.querySelector("textarea");
          payload.content = textarea?.value ?? "";
        }

        // ✅ FILE ATTACHMENT (metadata only for now)
        else if (sectionType === "File Attachment") {
          // no autosave content
          return;
        }

        // ✅ Generic fallback
        else {
          const el = sectionEl.querySelector("input, textarea, select");
          if (el) payload.content = el.value;
        }

        saveSection(sectionId, payload);
      }, 700);
    };

    sectionEl
      .querySelectorAll("input, textarea, select")
      .forEach(el => {
        el.addEventListener("input", triggerSave);
      });
  }


  async function saveSection(sectionId, payload) {
    const expId = getExperimentIdFromPage();

    if (!expId || !sectionId) {
      console.error("Cannot autosave: missing experiment or section ID");
      return;
    }

    try {
      await fetch(
        `http://localhost:8000/experiments/${expId}/sections/${sectionId}`,
        {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        }
      );

      console.log(`Section ${sectionId} autosaved`, payload);
    } catch (err) {
      console.error("Section autosave failed", err);
    }
  }

  /* =========================
   Chemistry Reaction Section → Custom UI + Autosave
   ========================= */
  function renderStructureBlocks(chemicals) {
    if (!chemicals || chemicals.length === 0) {
      return `<span class="reaction-empty">—</span>`;
    }

    return chemicals
      .map((chem, index) => {
        const plus =
          index < chemicals.length - 1
            ? `<span class="reaction-plus">+</span>`
            : "";

        return `
          <div class="reaction-structure-block">
            ${
              chem.structure_image
                ? `
                  <img
                    class="reaction-chemical-structure"
                    src="${chem.structure_image}"
                    alt="Structure of ${chem.name || "chemical"}"
                  />
                `
                : `
                  <span class="reaction-structure-fallback">
                    ${chem.name || "Unknown"}
                  </span>
                `
            }
            ${plus}
          </div>
        `;
      })
      .join("");
  }

  function renderReactionScheme(sectionEl) {
    const canvas = sectionEl.querySelector(".reaction-canvas");
    if (!canvas) return;

    const state = sectionEl.reactionState || {};

    const reactants = state.reactants || [];
    const products = state.products || [];

    // Nothing to show yet
    if (reactants.length === 0 && products.length === 0) {
      canvas.innerHTML = `
        <span class="reaction-canvas-placeholder">
          Reaction scheme will appear here
        </span>
      `;
      return;
    }

    canvas.innerHTML = `
      <div class="reaction-scheme">
        <div class="reaction-side reactants">
          ${renderStructureBlocks(reactants)}
        </div>

        <div class="reaction-arrow">⟶</div>

        <div class="reaction-side products">
          ${renderStructureBlocks(products)}
        </div>
      </div>
    `;
  }

  function wireChemicalSearch(sectionEl) {
    const input = sectionEl.querySelector(".reaction-search-input");
    if (!input) return;

    // Clear any previous chemical info when user edits input
    input.addEventListener("input", () => {
      sectionEl.selectedChemical = null;
    });
  }


  
  function showChemicalSuggestions(sectionEl, results) {
    let list = sectionEl.querySelector(".reaction-suggestions");

    if (!list) {
      list = document.createElement("div");
      list.className = "reaction-suggestions";
      sectionEl.querySelector(".reaction-search-row").appendChild(list);
    }

    list.innerHTML = "";

    results.forEach(chem => {
      const item = document.createElement("div");
      item.className = "reaction-suggestion-item";
      item.textContent = `${chem.name} (${chem.formula}, MW ${chem.molecular_weight})`;

      item.addEventListener("click", () => {
        sectionEl.selectedChemical = chem;
        list.innerHTML = "";
        sectionEl.querySelector(".reaction-search-input").value = chem.name;
      });

      list.appendChild(item);
    });
  }
  
  function saveReactionSection(sectionEl) {
    const sectionId = sectionEl.dataset.id;

    saveSection(sectionId, {
      reaction: sectionEl.reactionState
    });
  }

  
  function renderReactionLists(sectionEl) {
    const state = sectionEl.reactionState;

    ["reactants", "reagents", "solvents", "products"].forEach(role => {
      const list = sectionEl.querySelector(`.${role}`);
      list.innerHTML = "";

      state[role].forEach((chem, index) => {
        const item = document.createElement("div");
        item.className = "reaction-chemical-row";

        const formula = chem.formula ? `(${chem.formula})` : "";
        const mw = chem.molecular_weight
          ? `· MW ${Number(chem.molecular_weight).toFixed(2)}`
          : "";

        item.innerHTML = `
          <div class="reaction-chemical-main">
            <input
              type="text"
              class="reaction-chemical-name"
              value="${chem.name || ""}"
            />
            <span class="reaction-chemical-meta">
              ${formula} ${mw}
            </span>
            
          

          </div>

          <button
            class="reaction-chemical-remove"
            title="Remove"
            aria-label="Remove chemical"
          >
            ×
          </button>
        `;

        /* ✅ Inline name edit */
        item.querySelector(".reaction-chemical-name")
          .addEventListener("input", (e) => {
            chem.name = e.target.value;
            saveReactionSection(sectionEl);
          });

        /* ✅ Remove chemical */
        item.querySelector(".reaction-chemical-remove")
          .addEventListener("click", () => {
            state[role].splice(index, 1);
            renderReactionLists(sectionEl);
            renderReactionScheme(sectionEl);
            saveReactionSection(sectionEl);
          });

        list.appendChild(item);
      });
    });
  }



  function wireChemicalReactionUI(sectionEl, section) {
    const searchInput = sectionEl.querySelector(".reaction-search-input");
    const roleSelect = sectionEl.querySelector(".reaction-role-select");
    const addBtn = sectionEl.querySelector(".reaction-add-btn");

    // ✅ Initialize reaction state (reload-safe)
    sectionEl.reactionState = section.reaction || {
      reactants: [],
      reagents: [],
      solvents: [],
      products: []
    };

    
    addBtn.addEventListener("click", async () => {
      const role = roleSelect.value;
      const name = searchInput.value.trim();

      if (!name) return;

      let chem = null;

      try {
        // ✅ Auto-resolve chemical via backend
        const res = await fetch("http://localhost:8000/chemistry/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: name })
        });

        if (res.ok) {
          const results = await res.json();
          if (results.length > 0) {
            chem = {
              ...results[0],
              source: "pubchem"
            };
          }
        }
      } catch (err) {
        console.error("Chemical lookup failed", err);
      }

      // ✅ Fallback to manual entry if PubChem lookup fails
      if (!chem) {
        chem = {
          name: name,
          smiles: null,
          formula: null,
          molecular_weight: null,
          pubchem_cid: null,
          source: "manual"
        };
      }

      // ✅ Ensure reaction state exists
      const key = `${role}s`;
      if (!sectionEl.reactionState[key]) {
        sectionEl.reactionState[key] = [];
      }

      // ✅ Add chemical
      sectionEl.reactionState[key].push(chem);

      // ✅ Update UI + persist
      renderReactionLists(sectionEl);
      renderReactionScheme(sectionEl)
      saveReactionSection(sectionEl);

      // ✅ Reset input
      searchInput.value = "";
    });

  }
 
  
  function renderChemicalReactionUI(section) {
    return `
      <div class="reaction-section">

        <div class="reaction-search-row">
          <input
            type="text"
            class="reaction-search-input"
            placeholder="Search chemical (name, SMILES, CAS)"
          />

          <select class="reaction-role-select">
            <option value="reactant">Reactant</option>
            <option value="reagent">Reagent</option>
            <option value="product">Product</option>
            <option value="solvent">Solvent</option>
          </select>

          <button type="button" class="reaction-add-btn">
            Add
          </button>
        </div>
        <div class="reaction-suggestions"></div>
        <div class="reaction-groups">

          <div class="reaction-group">
            <div class="reaction-group-title">Reactants</div>
            <div class="reaction-list reactants"></div>
          </div>

          <div class="reaction-group">
            <div class="reaction-group-title">Reagents</div>
            <div class="reaction-list reagents"></div>
          </div>

          <div class="reaction-group">
            <div class="reaction-group-title">Solvents</div>
            <div class="reaction-list solvents"></div>
          </div>

          <div class="reaction-group">
            <div class="reaction-group-title">Products</div>
            <div class="reaction-list products"></div>
          </div>

        </div>

        <div class="reaction-canvas">
          <span class="reaction-canvas-placeholder">
            Reaction scheme will appear here
          </span>
        </div>

      </div>
    `;
  }

  
  function renderSection(section) {
    const editor = document.getElementById("editorSections");
    
    /* ============================
      chemical reaction → custom UI
      ============================ */
    if (section.type === "Chemical Reaction") {
      const el = document.createElement("div");
      el.className = "editor-section";
      el.dataset.id = section.id;

      el.innerHTML = `
        <div class="editor-section-header">
          <span class="chevron"></span>
          <input
            type="text"
            class="editor-section-title-input"
            value="${section.label || "Chemical Reaction"}"
          />
        </div>

        <div class="editor-section-body">
          ${renderChemicalReactionUI(section)}
        </div>
      `;

      el.querySelector(".editor-section-header")
        .addEventListener("click", (e) => {
          if (e.target.tagName === "INPUT") return;
          el.classList.toggle("collapsed");
        });
      wireChemicalReactionUI(el,section);
      wireChemicalSearch(el);
      renderReactionLists(el);
      renderReactionScheme(el); 
      attachAutosave(el, section.type);
      editor.appendChild(el);
      return;
    }
    /* ============================
      TEXT FIELD → METADATA ROW
      ============================ */
    const lookupTypes = ["Site", "Category", "Region", "County", "Brand(Food)", "Exp Details", "Wash Method"];
    
    if (section.type === "Text Field" || lookupTypes.includes(section.type)) {
      const row = document.createElement("div");
      row.className = "meta-row";
      row.dataset.id = section.id;

      row.innerHTML = `
        <div class="meta-label">
          <input
            type="text"
            class="meta-label-input"
            value="${section.label || section.type}"
          />
        </div>

        <div class="meta-value">
          ${
            section.type === "Text Field"
              ? `
                <input
                  type="text"
                  class="meta-input"
                  value="${section.content || ""}"
                />
              `
              : `
                <select class="meta-select">
                  <option value="">Select ${section.type}</option>
                  <option>A</option>
                  <option>B</option>
                </select>
              `
          }
        </div>
      `;

      attachAutosave(row,section.type);
      editor.appendChild(row);
      return;
    }


    /* ============================
      ALL OTHER SECTIONS → BLOCK
      ============================ */
    const sectionEl = document.createElement("div");
    sectionEl.className = "editor-section";
    sectionEl.dataset.id = section.id;

    sectionEl.innerHTML = `
      
      <div class="editor-section-header">
        <span class="chevron"></span>
        <input
          type="text"
          class="editor-section-title-input"
          value="${section.label || section.type}"
        />
      </div>


      <div class="editor-section-body">
        ${renderSectionBody(section)}
      </div>
    `;

    // expand / collapse
    sectionEl
      .querySelector(".editor-section-header")
      .addEventListener("click", () => {
        sectionEl.classList.toggle("collapsed");
      });

    attachAutosave(sectionEl, section.type);
    editor.appendChild(sectionEl);
  }


  function renderSectionBody(section) {
    switch (section.type) {

      case "Body Text":
        return `
          <textarea placeholder="Enter text...">
  ${section.content || ""}
          </textarea>
        `;

      
     /* case "Text Field":
        return `
          <div class="text-field-row">
            <div class="text-field-label">
              ${section.type}
            </div>
            <div class="text-field-value">
              <input
                type="text"
                class="text-field-input"
                value="${section.content || ""}"
              />
            </div>
          </div>
        `;*/


      case "File Attachment":
        return `<input type="file" />`;

      default:
        return `
          <select>
            <option value="">Select ${section.type}</option>
            <option>A</option>
            <option>B</option>
          </select>
        `;
    }
  }
